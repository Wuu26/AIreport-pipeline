name: Finance Market Report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report mode'
        required: true
        type: choice
        options:
          - morning
          - evening

jobs:
  finance-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.schedule == '0 0 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run morning report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SLACK_FINANCE_WEBHOOK_URL: ${{ secrets.SLACK_FINANCE_WEBHOOK_URL }}
        run: python -m finance_pipeline --mode morning

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-morning-logs-${{ github.run_id }}
          path: logs/finance-morning-*.json
          retention-days: 7

  finance-evening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.schedule == '30 13 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evening')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run evening report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SLACK_FINANCE_WEBHOOK_URL: ${{ secrets.SLACK_FINANCE_WEBHOOK_URL }}
        run: python -m finance_pipeline --mode evening

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-evening-logs-${{ github.run_id }}
          path: logs/finance-evening-*.json
          retention-days: 7
